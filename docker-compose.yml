services:
  musicbot-go:
    build:
      context: .
      dockerfile: Dockerfile
      target: full
    container_name: musicbot-go
    restart: unless-stopped
    working_dir: /app/workdir
    command: ["-c", "/app/workdir/config.ini"]
    volumes:
      - ./docker-data:/app/workdir
    environment:
      TZ: Asia/Shanghai
    # bot 通过 compose 网络访问 wrapper。在 config.ini 中设置：
    #   [plugins.applemusic]
    #   wrapper_host = wrapper
    #（仅无损 / Hi-Res / Atmos 需要；AAC 256k 无需 wrapper 即可工作）
    depends_on:
      - wrapper

  # --- Apple Music FairPlay 解密 wrapper（可选）---
  # 用于解密无损 / Hi-Res / Dolby Atmos。AAC 256k 不需要它——bot 内置原生解密。
  # wrapper 模拟安卓版 Apple Music App，因此需要它自己的一次性 Apple ID 登录
  #（无法复用 bot 的 media_user_token——两套独立认证体系），且账号需有有效订阅。
  #
  # 首次登录（只需一次；会话会持久化到挂载的 volume 中）：
  #   docker compose run --rm wrapper -L "appleid@example.com:password" -F -H 0.0.0.0
  # 完成 2FA 验证后按 Ctrl-C。之后直接 `docker compose up` 即可。
  #
  # 不需要无损的话，可删除整个 wrapper 服务。
  wrapper:
    image: ghcr.io/worldobservationlog/wrapper:latest
    container_name: musicbot-wrapper
    restart: unless-stopped
    # 必需：wrapper 内部运行一个安卓 userland（chroot）。
    privileged: true
    command: ["-H", "0.0.0.0"]
    volumes:
      - ./docker-data/wrapper:/app/rootfs/data
    # 端口通过 compose 网络以主机名 "wrapper" 暴露给 bot。
    # 仅当你还需要从裸核工具访问时，才需要映射到宿主机：
    # ports:
    #   - "10020:10020"
    #   - "20020:20020"
    #   - "30020:30020"
